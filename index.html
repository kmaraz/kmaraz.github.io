    <style>
      *,
      body,
      html {
        margin: 0;
        padding: 0;
        text-align: center;
        font-family: sans-serif;
        background-color: #fff;
      }
      body,
      html {
        overflow: hidden;
      }
      #counter-wrapper {
        float: left;
        width: 100%;
        height: 110px;
      }
      #counter {
        position: absolute;
        background: red;
        height: 100px;
        left: auto;
        right: 25px;
        top: 25px;
      }
      #christ {
        float: left;
        width: 100%;
      }
      #jesus {
        background-image: url(jesus.jpg);
        background-repeat: no-repeat;
        background-position: center center;
        background-size: contain;
        width: 100%;
        height: 600px;
      }
      #jesus.scared {
        background-image: url(jesus-scared.jpg);
      }
      #scare {
        width: 100%;
      }
      #scare button {
        background-image: url(scare.png);
        background-repeat: no-repeat;
        background-position: center center;
        background-size: contain;
        width: 200px;
        height: 200px;
        outline: none;
        border: 0px;
        cursor: pointer;
      }

      <section id="share">

    <script>
      (function () {
        var s_scare = false;
        var myCounter;

        var get_score = function () {
          $.get("https://scarejesus.maraz.co/get_score.php", function (data) {
            myCounter.setValue(data);
          });
        };

        var vote = function () {
          ga("send", "event", "Jesus", "Scared", "First Campaign");
          $.get("https://scarejesus.maraz.co/increment.php", function (data) {
            myCounter.setValue(data);
          });
        };

        var scare_jesus = function () {
          //      s_scare = true;
          vote();
          $("#jesus").addClass("scared");
          setTimeout(function () {
            $("#jesus").removeClass("scared");
            //        s_scare = false;
          }, 500);
        };

        $("#scare button").click(function () {
          //      if(!s_scare) {
          scare_jesus();
          //      };
        });

        $(window).resize(function () {
          var h = $(window).height() - 110;
          $("#jesus").height(h * 0.75);
          $("#scare button").height(h * 0.25);
        });

        var init = function () {
          $.ajaxSetup({ xhrFields: { withCredentials: false } });
          myCounter = new flipCounter("counter", { inc: 1 });
          myCounter.setIncrement(1);
          myCounter.setAuto(false);
          get_score();
          $(window).trigger("resize");
        };
        init();
      })();
    </script>
  </body>
